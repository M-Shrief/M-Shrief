name: Metrics
on:
  workflow_dispatch:
  # schedule:
    # - cron: '0 0 * * *' # Runs daily at midnight
    # - cron: '0 0 1 * *' # the 1st of every month

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Test METRICS_TOKEN
        run: |
          echo "Testing authentication with GitHub API..."
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.METRICS_TOKEN }}" \
            https://api.github.com/user
          if [ $? -eq 0 ]; then
            echo "✅ Authentication successful"
          else
            echo "❌ Authentication failed"
            exit 1
          fi
      - name: metrics
        uses: lowlighter/metrics@latest
        with:
          # Avoid: 
          # - Starts with GITHUB_, uses hyphen, lowercase = github-token: abc123
          # - Contains special characters = my@secret#key: value
          # - Structured data = CONFIG_BLOB: {"api_key": "123", "url": "https://example.com"}
          token: ${{ secrets.METRICS_TOKEN }}
          user: M-Shrief
          filename: github-metrics.languages.svg
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          # plugin_languages_indepth: yes
          # commits_authoring: m-shrief, M-Shrief, m.shrief.dev@proton.me
          # plugin_languages_analysis_timeout: 15
          plugin_languages_ignored: html, css